<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JRmusic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #050505; color: #fff;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 背景封面模糊层 */
        #bg-layer {
            position: absolute;
            inset: -5%; 
            background-size: cover;
            background-position: center;
            background-color: #050505;
            filter: blur(40px) brightness(0.3);
            z-index: 0;
            transition: background-image 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #main-view {
            position: absolute; inset: 0; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* 极致单行歌词显示（完全纯净） */
        #lyric-display {
            font-size: 2.8rem;
            font-weight: 900;
            color: #ffffff;
            text-align: center;
            width: 90%;
            max-width: 1200px;
            text-shadow: 0 8px 30px rgba(0,0,0,0.8);
            letter-spacing: 0.05em;
            line-height: 1.4;
            pointer-events: none; 
            /* 丝滑的淡入淡出动效 */
            opacity: 0;
            transform: scale(0.95) translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* 侧边栏/列表 */
        #sidebar {
            position: absolute; right: -360px; top: 0; bottom: 0; width: 320px;
            background: rgba(5, 5, 5, 0.6); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-left: 1px solid rgba(255,255,255,0.1);
            z-index: 50; display: flex; flex-direction: column;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar.open { right: 0; }

        /* 动态控制栏 */
        #controls {
            position: absolute; 
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%; 
            max-width: 600px;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px;
            padding: 20px 30px; 
            display: flex; flex-direction: column; gap: 15px;
            z-index: 20;
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* 播放时滑向右下角 */
        body.is-playing #controls {
            left: calc(100% - 30px);
            transform: translateX(-100%);
            width: calc(100vw - 60px);
            max-width: 320px; 
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.15);
            border-color: rgba(255, 255, 255, 0.05);
            opacity: 0.5; 
        }

        body.is-playing #controls:hover {
            opacity: 1;
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.15);
        }

        #track-title { transition: font-size 0.5s; }
        body.is-playing #track-title { font-size: 1rem; }

        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 4px;
            background: rgba(255,255,255,0.2); border-radius: 2px; outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px; background: #fff;
            border-radius: 50%; box-shadow: 0 0 10px #fff; transition: transform 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.5); }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div id="main-view">
        <div id="lyric-display"></div>

        <div id="controls">
            <div class="flex justify-between items-center w-full">
                <div class="flex flex-col overflow-hidden w-2/3">
                    <span id="track-title" class="text-white font-bold text-lg truncate">准备就绪</span>
                    <span id="track-status" class="text-cyan-400 text-xs font-mono tracking-widest mt-1 truncate">SYSTEM STANDBY</span>
                </div>
                <div class="flex gap-3">
                    <button id="btn-play" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center hover:bg-white/20 transition-colors">
                        <svg id="icon-play" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="icon-pause" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <button id="btn-menu" class="w-10 h-10 border border-white/20 rounded-full flex items-center justify-center hover:bg-white/10 transition-colors">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                </div>
            </div>
            <div class="flex items-center gap-4 w-full text-xs font-mono text-white/50">
                <span id="time-curr">0:00</span>
                <input type="range" id="progress-bar" value="0" min="0" step="0.1">
                <span id="time-total">0:00</span>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <div class="p-5 border-b border-white/10 flex justify-between items-center">
            <div class="text-sm font-bold tracking-wider text-cyan-400">PLAYLIST</div>
            <button id="btn-close-menu" class="text-white/50 hover:text-white">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="flex gap-2 overflow-x-auto no-scrollbar p-3 border-b border-white/10" id="playlist-nav"></div>
        <ul id="track-list" class="flex-1 overflow-y-auto no-scrollbar p-2"></ul>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const REPO_OWNER = 'zhangzhanhang855';
        const REPO_NAME = 'musiconly';
        const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;

        const audio = document.getElementById('audio-player');
        const bgLayer = document.getElementById('bg-layer');
        const lyricDisplay = document.getElementById('lyric-display');
        const trackTitle = document.getElementById('track-title');
        const trackStatus = document.getElementById('track-status');
        
        const btnPlay = document.getElementById('btn-play');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const btnMenu = document.getElementById('btn-menu');
        const btnCloseMenu = document.getElementById('btn-close-menu');
        const sidebar = document.getElementById('sidebar');
        const progressBar = document.getElementById('progress-bar');
        const timeCurr = document.getElementById('time-curr');
        const timeTotal = document.getElementById('time-total');
        
        const navContainer = document.getElementById('playlist-nav');
        const listContainer = document.getElementById('track-list');

        let playlists = {};
        let currentPlaylist = 'Root';
        let filteredTracks = [];
        let curIdx = 0;
        let currentCoverObjectURL = null;
        
        let parsedLyrics = [];
        let currentLyricIndex = -1;

        async function loadLibrary() {
            try {
                trackStatus.innerText = 'SYNCING REPO...';
                const res = await fetch(API_BASE);
                if (!res.ok) throw new Error();
                const items = await res.json();
                
                const filterAudio = (arr) => arr.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => ({
                    t: f.name.replace(/\.[^/.]+$/, ''), u: f.download_url
                }));

                playlists['Root'] = filterAudio(items);
                
                const folders = items.filter(i => i.type === 'dir');
                for (let f of folders) {
                    const subData = await (await fetch(f.url)).json();
                    const tracks = filterAudio(subData);
                    if(tracks.length > 0) playlists[f.name] = tracks;
                }
                
                trackStatus.innerText = 'REPO SYNCED';
                renderNav();
                switchPlaylist('Root');
            } catch (e) {
                trackStatus.innerText = 'SYNC FAILED / API LIMIT';
            }
        }

        function renderNav() {
            navContainer.innerHTML = Object.keys(playlists).map(name => 
                `<button class="text-xs px-3 py-1 border border-white/10 rounded-full hover:bg-white/10 transition-colors whitespace-nowrap btn-nav" data-name="${name}">${name}</button>`
            ).join('');
            navContainer.querySelectorAll('.btn-nav').forEach(btn => btn.onclick = () => switchPlaylist(btn.dataset.name));
        }

        function switchPlaylist(name) {
            currentPlaylist = name;
            filteredTracks = playlists[name] || [];
            listContainer.innerHTML = filteredTracks.map((s, i) => {
                const activeClass = curIdx === i ? 'text-cyan-400 bg-cyan-900/20' : 'text-gray-400';
                return `<li class="p-3 border-b border-white/5 text-sm rounded-lg cursor-pointer hover:bg-white/5 transition-colors ${activeClass}" data-idx="${i}">${s.t}</li>`;
            }).join('');
            listContainer.querySelectorAll('li').forEach(item => item.onclick = () => executeLoad(parseInt(item.dataset.idx), true));
        }

        function executeLoad(idx, autoPlay) {
            if (filteredTracks.length === 0) return;
            curIdx = idx;
            const song = filteredTracks[curIdx];
            
            audio.src = song.u;
            trackTitle.innerText = song.t;
            trackStatus.innerText = 'FETCHING ID3...';
            bgLayer.style.backgroundImage = 'none';
            
            // 每次切歌彻底清空中央屏幕
            parsedLyrics = [];
            currentLyricIndex = -1;
            lyricDisplay.style.opacity = 0;
            lyricDisplay.innerText = "";
            
            if (currentCoverObjectURL) {
                URL.revokeObjectURL(currentCoverObjectURL);
                currentCoverObjectURL = null;
            }

            switchPlaylist(currentPlaylist);
            sidebar.classList.remove('open');
            if (autoPlay) togglePlay(true);

            let lyricsFound = false;

            const lrcUrl = song.u.replace(/\.(mp3|flac|wav|m4a)$/i, '.lrc');
            fetch(lrcUrl).then(res => { if(res.ok) return res.text(); throw new Error(); })
                .then(lrcText => {
                    if (lrcText && lrcText.trim()) {
                        lyricsFound = true;
                        processLyrics(lrcText);
                    }
                }).catch(() => {});

            fetch(song.u).then(res => res.blob()).then(blob => {
                if (!window.jsmediatags) return;
                window.jsmediatags.read(blob, {
                    onSuccess: (tag) => {
                        const pic = tag.tags.picture;
                        if (pic) {
                            const byteArray = new Uint8Array(pic.data);
                            const coverBlob = new Blob([byteArray], { type: pic.format });
                            currentCoverObjectURL = URL.createObjectURL(coverBlob);
                            bgLayer.style.backgroundImage = `url(${currentCoverObjectURL})`;
                        }

                        if (!lyricsFound) {
                            const innerLrc = aggressivelyFindLyrics(tag.tags);
                            if (innerLrc) processLyrics(innerLrc);
                            else displayPureMusic();
                        }
                    },
                    onError: () => { if(!lyricsFound) displayPureMusic(); }
                });
            }).catch(() => { if(!lyricsFound) displayPureMusic(); });
        }

        function aggressivelyFindLyrics(tags) {
            if (!tags) return "";
            const extract = (obj) => {
                if (!obj) return "";
                if (typeof obj === 'string') return obj;
                if (typeof obj.text === 'string') return obj.text;
                if (typeof obj.lyrics === 'string') return obj.lyrics;
                if (obj.data) {
                    if (typeof obj.data === 'string') return obj.data;
                    if (typeof obj.data.text === 'string') return obj.data.text;
                }
                return "";
            };

            let primary = extract(tags.lyrics) || extract(tags.USLT) || extract(tags.SYLT);
            if (primary && primary.includes('[')) return primary;

            for (let key in tags) {
                const arr = Array.isArray(tags[key]) ? tags[key] : [tags[key]];
                for (let i of arr) {
                    let txt = extract(i);
                    if (typeof txt === 'string' && txt.includes('[00:')) return txt;
                    if (i && i.data) {
                        let deepTxt = extract(i.data.data) || extract(i.data);
                        if (typeof deepTxt === 'string' && deepTxt.includes('[00:')) return deepTxt;
                    }
                }
            }
            return primary; 
        }

        function processLyrics(rawText) {
            if (!rawText || typeof rawText !== 'string') { displayPureMusic(); return; }
            
            const lines = rawText.replace(/\0/g, '').trim().split(/\r?\n/);
            const timeReg = /\[(\d{1,3}):(\d{1,2})(?:[.:](\d{1,3}))?\]/g;
            parsedLyrics = [];
            
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                let match;
                let timeTags = [];
                timeReg.lastIndex = 0; 
                
                while ((match = timeReg.exec(line)) !== null) {
                    const m = parseInt(match[1], 10);
                    const s = parseInt(match[2], 10);
                    const msStr = match[3] || '0';
                    const ms = parseInt(msStr.padEnd(3, '0').slice(0, 3), 10);
                    timeTags.push(m * 60 + s + ms / 1000);
                }
                
                if (timeTags.length > 0) {
                    let text = line.replace(/\[\d{1,3}:\d{1,2}(?:[.:]\d{1,3})?\]/g, '').trim();
                    text = text.split('（翻译：')[0].split('(翻译：')[0].trim();
                    
                    for (let t of timeTags) {
                        parsedLyrics.push({ time: t, text: text || '' });
                    }
                }
            }
            
            if (parsedLyrics.length > 0) {
                trackStatus.innerText = 'LYRICS SYNCED';
                parsedLyrics.sort((a, b) => a.time - b.time);
            } else {
                displayPureMusic();
            }
        }

        function displayPureMusic() {
            parsedLyrics = [];
            trackStatus.innerText = 'PURE MUSIC / INSTRUMENTAL';
            // 纯音乐状态下，也保持中央屏幕完全干净
            lyricDisplay.style.opacity = 0;
            lyricDisplay.innerText = "";
        }

        // --- 真正的“只要当前歌词”控制逻辑 ---
        function syncLyricsTimeline(s) {
            if (parsedLyrics.length === 0) return;
            let activeIdx = -1;
            
            // 寻找当前时间段匹配的歌词
            for (let i = 0; i < parsedLyrics.length; i++) {
                if (s >= parsedLyrics[i].time - 0.1) activeIdx = i;
                else break;
            }
            
            if (activeIdx !== currentLyricIndex) {
                if (activeIdx !== -1) {
                    const nextText = parsedLyrics[activeIdx].text;
                    
                    // 渐隐并下沉旧歌词
                    lyricDisplay.style.opacity = 0;
                    lyricDisplay.style.transform = 'scale(0.95) translateY(10px)';
                    
                    setTimeout(() => {
                        lyricDisplay.innerText = nextText; 
                        // 如果这一行是空白间奏，就不显示，实现彻底隐形
                        if(nextText.trim() === '') {
                            lyricDisplay.style.opacity = 0;
                        } else {
                            // 浮出新歌词
                            lyricDisplay.style.opacity = 1;
                            lyricDisplay.style.transform = 'scale(1) translateY(0px)';
                        }
                    }, 150); 
                } else {
                    // 如果在第一句歌词唱出来之前（前奏期间），强行隐藏
                    lyricDisplay.style.opacity = 0;
                    setTimeout(() => { lyricDisplay.innerText = ""; }, 150);
                }
                currentLyricIndex = activeIdx;
            }
        }

        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
        }

        function togglePlay(forcePlay) {
            if (!audio.src) return;
            if (forcePlay) {
                audio.play().catch(e => console.log(e));
            } else {
                if (audio.paused) audio.play();
                else audio.pause();
            }
        }

        audio.addEventListener('play', () => {
            iconPlay.style.display = 'none'; 
            iconPause.style.display = 'block';
            document.body.classList.add('is-playing');
        });

        audio.addEventListener('pause', () => {
            iconPlay.style.display = 'block'; 
            iconPause.style.display = 'none';
            document.body.classList.remove('is-playing');
        });

        btnPlay.onclick = () => togglePlay();
        btnMenu.onclick = () => sidebar.classList.add('open');
        btnCloseMenu.onclick = () => sidebar.classList.remove('open');
        
        audio.onloadedmetadata = () => {
            progressBar.max = audio.duration;
            timeTotal.innerText = formatTime(audio.duration);
        };

        audio.ontimeupdate = () => {
            if (!progressBar.classList.contains('seeking')) {
                progressBar.value = audio.currentTime;
                timeCurr.innerText = formatTime(audio.currentTime);
            }
            const pct = (audio.currentTime / audio.duration) * 100;
            progressBar.style.background = `linear-gradient(to right, #fff ${pct}%, rgba(255,255,255,0.2) ${pct}%)`;
            syncLyricsTimeline(audio.currentTime);
        };

        audio.onended = () => {
            if (filteredTracks.length > 0) executeLoad((curIdx + 1) % filteredTracks.length, true);
        };

        progressBar.oninput = () => {
            progressBar.classList.add('seeking');
            timeCurr.innerText = formatTime(progressBar.value);
        };
        progressBar.onchange = () => {
            audio.currentTime = progressBar.value;
            progressBar.classList.remove('seeking');
        };

        loadLibrary();
    </script>
</body>
</html>
